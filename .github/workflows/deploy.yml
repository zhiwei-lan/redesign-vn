name: Deploy to 1Panel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SERVER_KEY }}
          port: 2218
          script: |
            cd /opt/1panel/www/sites/redesign.vn.vigo.co.kr/index
            git pull origin main
