name: Deploy to 1Panel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        id: deploy
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SERVER_KEY }}
          port: 2208
          timeout: 30s
          script: |
            cd /opt/1panel/www/sites/redesign.vn.vigo.co.kr/index
            git pull origin main
            echo "✅ 部署完成时间: $(date)"

      - name: Notify failure - Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.126.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: '【紧急】redesign.vn.vigo.co.kr 自动部署失败 - 请手动拉取'
          to: ${{ secrets.EMAIL_USER }}
          from: GitHub Actions <${{ secrets.EMAIL_USER }}>
          html_body: |
            <h2 style="color: #e74c3c;">⚠️ redesign.vn.vigo.co.kr 自动部署失败</h2>
            <p><b>仓库:</b> ${{ github.repository }}</p>
            <p><b>提交信息:</b> ${{ github.event.head_commit.message }}</p>
            <h3>🔧 请手动执行:</h3>
            <pre>cd /opt/1panel/www/sites/redesign.vn.vigo.co.kr/index && git pull origin main</pre>
            <p><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">查看详细日志 →</a></p>
